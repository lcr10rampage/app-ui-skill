<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Check Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --color-bg:       #0d1b2a;
      --color-page:     #fef9ee;
      --color-cover:    #8b4513;
      --color-spine:    #2a0f04;
      --color-ink:      #398212;
      --color-stamp:    #7a1010;
      --color-accent:   #d4a847;
      --color-muted:    #8a9ab5;

      --ink-box-w:      340px;
      --ink-box-h:      218px;
      --ink-border-w:   6px;
      --ink-border-r:   14px;

      --slide-dur:      0.75s;
      --flip-dur:       0.24s;
      --stamp-fall-dur: 0.4s;
      --stamp-lift-dur: 0.44s;
      --ink-dur:        0.65s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: var(--color-bg);
      font-family: 'EB Garamond', Georgia, serif;
    }

    /* ═══════════════════════════════════════════
       FULL-SCREEN BIBLE (slides in from left)
    ═══════════════════════════════════════════ */
    #book-wrap {
      position: fixed; inset: 0;
      perspective: 3000px;
      perspective-origin: 50% 50%;
      /* starts off-screen; set by JS */
    }

    #book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }

    /* Leather back */
    #back-cover {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #6b3010 0%, #3a1806 55%, #220d03 100%);
      z-index: 1;
    }

    /* Left page */
    #left-page {
      position: absolute; top: 0; bottom: 0; left: 0;
      width: calc(50% - 16px);
      background: linear-gradient(to right, #d0bc88, #eddfc0 65%, #e8d8b0);
      z-index: 2; overflow: hidden;
    }

    #left-page::before {
      content: '';
      position: absolute; inset: 56px 36px 56px 48px;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 26px,
        rgba(0,0,0,0.065) 26px, rgba(0,0,0,0.065) 27px
      );
      pointer-events: none;
    }

    .left-text {
      position: absolute; inset: 56px 36px 56px 48px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(9px, 1.05vw, 14px);
      line-height: 27px;
      color: rgba(30,15,4,0.68);
      overflow: hidden;
    }

    /* Spine */
    #spine {
      position: absolute; top: 0; bottom: 0;
      left: calc(50% - 16px); width: 32px;
      background: linear-gradient(90deg,
        #110601 0%, #3b1a08 30%, #5e2c0a 50%, #3b1a08 70%, #110601 100%);
      z-index: 10;
      box-shadow:
        inset 2px 0 8px rgba(0,0,0,0.5),
        inset -2px 0 8px rgba(0,0,0,0.5),
        5px 0 18px rgba(0,0,0,0.45),
        -5px 0 18px rgba(0,0,0,0.45);
    }

    /* Right open page (always visible — pages flip off left side revealing left page) */
    #right-page {
      position: absolute; top: 0; bottom: 0;
      left: calc(50% + 16px); width: calc(50% - 16px);
      background: linear-gradient(to right, #efe3c4, #fef9ee 55%, #faf3e0);
      z-index: 2; overflow: hidden;
    }

    #right-page::before {
      content: '';
      position: absolute; inset: 56px 48px 56px 36px;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 26px,
        rgba(0,0,0,0.055) 26px, rgba(0,0,0,0.055) 27px
      );
      pointer-events: none;
    }

    /* Flipping pages – JS-generated */
    .page-flip {
      position: absolute; top: 0; bottom: 0;
      left: 0; width: calc(50% - 16px);
      transform-origin: right center;
      transform: rotateY(0deg);
      transform-style: preserve-3d;
    }

    /* Front face (left side — has text) */
    .page-front {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      overflow: hidden;
    }

    /* Back face (right side after flip — plain parchment) */
    .page-back {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      transform: rotateY(180deg);
      background: linear-gradient(to left, #eddfc0, #f5e8cc);
      overflow: hidden;
    }

    /* Line rules on back face */
    .page-back::before {
      content: '';
      position: absolute; inset: 56px 48px 56px 36px;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 26px,
        rgba(0,0,0,0.05) 26px, rgba(0,0,0,0.05) 27px
      );
      pointer-events: none;
    }

    /* Line rules on front face */
    .page-front::before {
      content: '';
      position: absolute; inset: 56px 36px 56px 48px;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 26px,
        rgba(0,0,0,0.055) 26px, rgba(0,0,0,0.055) 27px
      );
      pointer-events: none; z-index: 1;
    }

    /* Text block inside each flipping page */
    .page-text {
      position: absolute; inset: 56px 36px 70px 48px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(9px, 1.05vw, 14px);
      line-height: 27px;
      color: rgba(20,8,2,0.72);
      overflow: hidden;
      z-index: 2;
    }

    .page-chapter {
      font-size: clamp(7px, 0.75vw, 10px);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(20,8,2,0.38);
      margin-bottom: 4px;
      font-style: normal;
    }

    .page-num {
      position: absolute;
      bottom: 28px;
      font-size: clamp(8px, 0.9vw, 12px);
      color: rgba(20,8,2,0.32);
      font-style: italic;
    }

    .page-num-left  { left: 36px; }
    .page-num-right { right: 44px; }

    /* Front cover – already open, behind left page */
    #front-cover {
      position: absolute; top: 0; height: 100%;
      left: calc(50% - 16px); width: calc(50% - 16px);
      transform-origin: left center;
      transform: rotateY(-178deg);
      background: linear-gradient(140deg, var(--color-cover) 0%, #6b3010 40%, #5a2808 100%);
      backface-visibility: hidden;
      z-index: 3;
      box-shadow: -10px 0 32px rgba(0,0,0,0.5);
    }

    /* Ink mark — centered across full spread, above spine */
    #ink-mark {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: var(--ink-box-w);
      height: var(--ink-box-h);
      background: var(--ink-box-bg, rgba(192,57,43,0.065));
      border: var(--ink-border-w) solid var(--ink-border-color, rgba(192,57,43,0.2));
      border-radius: var(--ink-border-r);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; z-index: 25;
    }

    #ink-mark svg { width: 65%; height: 65%; }
    #check-line { stroke: var(--color-ink); }

    /* ═══════════════════════════════════════════
       STAMP
    ═══════════════════════════════════════════ */
    #stamp-wrap {
      position: absolute;
      left: 50%; top: -440px;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      z-index: 30; pointer-events: none;
    }

    #stamp-handle {
      width: 34px; height: 82px;
      background: linear-gradient(to bottom, #8a6040, #4a2c14);
      border-radius: 10px 10px 4px 4px;
    }

    #stamp-grip {
      width: 264px; height: 18px;
      background: linear-gradient(to bottom, #5a3820, #3a2010);
      border-radius: 4px;
    }

    #stamp-body {
      width: 264px; height: 148px;
      background: linear-gradient(170deg, #9b2020, var(--color-stamp));
      border-radius: 7px;
      display: flex; align-items: flex-end;
      justify-content: center; padding-bottom: 7px;
      box-shadow: 0 10px 36px rgba(0,0,0,0.55), inset 0 2px 0 rgba(255,255,255,0.08);
    }

    #stamp-pad {
      width: 240px; height: 118px;
      background: transparent;
    }

    /* ═══════════════════════════════════════════
       READING CARD (slides away right)
    ═══════════════════════════════════════════ */
    #slide-panel {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      background: var(--color-bg);
    }

    .card {
      background: #162032; border: 1px solid #2a3a52;
      border-radius: 20px; padding: 38px 52px;
      text-align: center; min-width: 272px;
    }

    .card-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--color-muted);
      font-family: system-ui, sans-serif; margin-bottom: 10px;
    }

    .card-title { font-size: 26px; font-weight: 700; color: var(--color-accent); margin-bottom: 5px; }
    .card-sub   { font-size: 15px; color: var(--color-muted); }

    .card-btn {
      margin-top: 26px; padding: 11px 32px;
      background: var(--color-accent); color: #0d1b2a;
      border: none; border-radius: 11px;
      font-size: 14px; font-weight: 700;
      font-family: system-ui, sans-serif;
      cursor: pointer; letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }

    .card-btn:hover { opacity: 0.85; }

    /* ═══════════════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════════════ */
    @keyframes shake {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-6px,4px); }
      45%  { transform: translate(6px,-3px); }
      70%  { transform: translate(-3px,2px); }
      100% { transform: translate(0,0); }
    }

    #book-wrap.shake { animation: shake 0.22s ease-out; }

    @keyframes squish {
      0%   { transform: scaleY(1); }
      35%  { transform: scaleY(0.78); }
      100% { transform: scaleY(1); }
    }

    #stamp-body.squish { animation: squish 0.2s ease-out; }

    /* ═══════════════════════════════════════════
       EDIT PANEL
    ═══════════════════════════════════════════ */
    #panel-tab {
      position: fixed; right: 0; top: 50%;
      transform: translateY(-50%);
      width: 38px; height: 46px;
      background: rgba(8,10,16,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-right: none; border-radius: 9px 0 0 9px;
      cursor: pointer; color: #bbb; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      z-index: 102; transition: color 0.15s;
    }

    #panel-tab:hover { color: #fff; }

    #edit-panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 254px;
      background: rgba(8,10,16,0.94);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.07);
      box-shadow: -8px 0 40px rgba(0,0,0,0.55);
      overflow-y: auto; font-family: system-ui, sans-serif;
      font-size: 12px; color: #ccc;
      padding: 20px 16px; z-index: 101;
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      transform: translateX(254px);
    }

    #edit-panel.open { transform: translateX(0); }

    .panel-header { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    .section-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.13em; color: #555; margin: 14px 0 8px; font-weight: 600; }
    .control-row { margin-bottom: 10px; }
    .control-row label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; color: #aaa; font-size: 11px; }
    .control-row label .val { color: #777; font-size: 10px; }
    .control-row input[type="range"] { width: 100%; accent-color: #6366f1; cursor: pointer; }
    .color-swatch-wrap { display: flex; align-items: center; gap: 8px; }
    .color-swatch-wrap input[type="color"] { width: 26px; height: 20px; border: none; border-radius: 4px; cursor: pointer; padding: 0; }
    .hex-label { font-size: 10px; color: #888; font-family: monospace; }

    #replay-btn, #reset-btn {
      width: 100%; margin-top: 8px; padding: 9px;
      border-radius: 8px; font-size: 11px;
      cursor: pointer; font-family: system-ui, sans-serif;
      transition: background 0.15s;
    }
    #replay-btn {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
    }
    #replay-btn:hover { background: rgba(99,102,241,0.25); }
    #save-btn {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      color: #6ee7b7;
    }
    #save-btn:hover { background: rgba(52,211,153,0.18); }
    #save-btn.saved {
      background: rgba(52,211,153,0.2);
      border-color: rgba(52,211,153,0.6);
      color: #34d399;
    }
    #reset-btn {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      color: #f87171;
    }
    #reset-btn:hover { background: rgba(255,80,80,0.16); }
  </style>
</head>
<body>

  <!-- Full-screen Bible -->
  <div id="book-wrap">
    <div id="book">
      <div id="back-cover"></div>

      <div id="left-page">
        <div class="left-text" id="left-text-content"></div>
        <span class="page-num page-num-left" id="left-page-num">1</span>
      </div>

      <div id="right-page">
        <span class="page-num page-num-right">2</span>
      </div>

      <!-- page-flip divs injected by JS before front-cover -->
      <div id="front-cover"></div>
      <div id="spine"></div>
    </div>

    <!-- ink-mark is a sibling of #book so 3D transform context doesn't affect it -->
    <div id="ink-mark">
      <svg width="130" height="82" viewBox="0 0 130 82" fill="none">
        <polyline id="check-line"
          points="14,44 48,70 116,12"
          stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="200" stroke-dashoffset="200"
        />
      </svg>
    </div>

    <div id="stamp-wrap">
      <div id="stamp-pad"></div>
    </div>
  </div>

  <!-- Reading card (slides right) -->
  <div id="slide-panel">
    <div class="card">
      <p class="card-label">Day 1 · Genesis</p>
      <h2 class="card-title">Today's Reading</h2>
      <p class="card-sub">Genesis 1–3 · ~12 min</p>
      <button class="card-btn" id="mark-btn">Mark as Read ✓</button>
    </div>
  </div>

  <!-- Full-screen black fade -->
  <div id="fade-overlay" style="position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:200;"></div>

  <!-- Gear tab (always visible) -->
  <button id="panel-tab">⚙</button>

  <!-- Edit panel -->
  <div id="edit-panel">
    <div class="panel-header">Live Edit</div>

    <div class="section-label">Colors</div>
    <div class="control-row">
      <label>Background</label>
      <div class="color-swatch-wrap">
        <input type="color" id="c-bg" value="#0d1b2a" />
        <span class="hex-label" id="h-bg">#0d1b2a</span>
      </div>
    </div>
    <div class="control-row">
      <label>Cover Color</label>
      <div class="color-swatch-wrap">
        <input type="color" id="c-cover" value="#8b4513" />
        <span class="hex-label" id="h-cover">#8b4513</span>
      </div>
    </div>
    <div class="control-row">
      <label>Page Color</label>
      <div class="color-swatch-wrap">
        <input type="color" id="c-page" value="#fef9ee" />
        <span class="hex-label" id="h-page">#fef9ee</span>
      </div>
    </div>
    <div class="control-row">
      <label>Page Text</label>
      <div class="color-swatch-wrap">
        <input type="color" id="c-pagetext" value="#140802" />
        <span class="hex-label" id="h-pagetext">#140802</span>
      </div>
    </div>
    <div class="control-row">
      <label>Ink Color</label>
      <div class="color-swatch-wrap">
        <input type="color" id="c-ink" value="#398212" />
        <span class="hex-label" id="h-ink">#c0392b</span>
      </div>
    </div>
    <div class="control-row">
      <label>Accent</label>
      <div class="color-swatch-wrap">
        <input type="color" id="c-accent" value="#d4a847" />
        <span class="hex-label" id="h-accent">#d4a847</span>
      </div>
    </div>

    <div class="section-label">Timing</div>
    <div class="control-row">
      <label>Slide Speed <span class="val" id="v-slide">0.75s</span></label>
      <input type="range" id="r-slide" min="0.2" max="1.8" step="0.05" value="0.75" />
    </div>
    <div class="control-row">
      <label>Flip Speed <span class="val" id="v-flip">0.24s</span></label>
      <input type="range" id="r-flip" min="0.08" max="0.7" step="0.02" value="0.24" />
    </div>
    <div class="control-row">
      <label>Flip Gap <span class="val" id="v-gap">100ms</span></label>
      <input type="range" id="r-gap" min="20" max="400" step="10" value="150" />
    </div>
    <div class="control-row">
      <label>Page Count <span class="val" id="v-pages">9</span></label>
      <input type="range" id="r-pages" min="3" max="20" step="1" value="9" />
    </div>
    <div class="control-row">
      <label>Stamp Fall <span class="val" id="v-stamp">0.42s</span></label>
      <input type="range" id="r-stamp" min="0.1" max="1.2" step="0.05" value="0.4" />
    </div>
    <div class="control-row">
      <label>Ink Draw <span class="val" id="v-ink">0.55s</span></label>
      <input type="range" id="r-ink" min="0.15" max="1.8" step="0.05" value="0.65" />
    </div>

    <div class="section-label">Stamp Mark</div>
    <div class="control-row">
      <label>Box Width <span class="val" id="v-ibw">340px</span></label>
      <input type="range" id="r-ibw" min="80" max="600" step="4" value="340" />
    </div>
    <div class="control-row">
      <label>Box Height <span class="val" id="v-ibh">218px</span></label>
      <input type="range" id="r-ibh" min="50" max="400" step="4" value="218" />
    </div>
    <div class="control-row">
      <label>Border Width <span class="val" id="v-ibr">5.5px</span></label>
      <input type="range" id="r-ibr" min="0" max="12" step="0.5" value="6" />
    </div>
    <div class="control-row">
      <label>Corner Radius <span class="val" id="v-ibc">12px</span></label>
      <input type="range" id="r-ibc" min="0" max="60" step="2" value="14" />
    </div>
    <div class="control-row">
      <label>Border Opacity <span class="val" id="v-ibo">20%</span></label>
      <input type="range" id="r-ibo" min="0" max="100" step="1" value="100" />
    </div>

    <div class="section-label">Actions</div>
    <button id="replay-btn">↺ Replay</button>
    <button id="save-btn">Save Changes</button>
    <button id="reset-btn">⊘ Reset to Defaults</button>
  </div>

  <script>
    const root       = document.documentElement
    const slidePanel = document.getElementById('slide-panel')
    const bookWrap   = document.getElementById('book-wrap')
    const book       = document.getElementById('book')
    const rightPage  = document.getElementById('right-page')
    const inkMark    = document.getElementById('ink-mark')
    const checkLine  = document.getElementById('check-line')
    const stampWrap  = document.getElementById('stamp-wrap')

    let animating = false
    let pageEls   = []

    function wait(ms) { return new Promise(r => setTimeout(r, ms)) }
    function getMs(v) {
      return parseFloat(getComputedStyle(root).getPropertyValue(v).trim()) * 1000
    }

    // ── Helpers ─────────────────────────────────────────────────────────
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16)
      const g = parseInt(hex.slice(3,5),16)
      const b = parseInt(hex.slice(5,7),16)
      return `${r},${g},${b}`
    }

    function updateInkMarkBorder() {
      const hex     = document.getElementById('c-ink').value
      const rgb     = hexToRgb(hex)
      const opacity = parseInt(document.getElementById('r-ibo').value) / 100
      root.style.setProperty('--ink-border-color', `rgba(${rgb},${opacity})`)
      root.style.setProperty('--ink-box-bg',        `rgba(${rgb},${Math.round(opacity * 0.32 * 100) / 100})`)
    }

    // ── Bible text for pages ────────────────────────────────────────────
    const PAGE_TEXTS = [
      { ch: 'Genesis 1:1–5', body: 'In the beginning God created the heaven and the earth. And the earth was without form, and void; and darkness was upon the face of the deep. And the Spirit of God moved upon the face of the waters.\n\nAnd God said, Let there be light: and there was light. And God saw the light, that it was good: and God divided the light from the darkness. And God called the light Day, and the darkness he called Night. And the evening and the morning were the first day.\n\nAnd God said, Let there be a firmament in the midst of the waters, and let it divide the waters from the waters. And God made the firmament, and divided the waters which were under the firmament from the waters which were above the firmament: and it was so. And God called the firmament Heaven. And the evening and the morning were the second day.\n\nAnd God said, Let the waters under the heaven be gathered together unto one place, and let the dry land appear: and it was so. And God called the dry land Earth; and the gathering together of the waters called he Seas: and God saw that it was good.' },

      { ch: 'Genesis 1:11–19', body: 'And God said, Let the earth bring forth grass, the herb yielding seed, and the fruit tree yielding fruit after his kind, whose seed is in itself, upon the earth: and it was so. And the earth brought forth grass, and herb yielding seed after his kind, and the tree yielding fruit, whose seed was in itself, after his kind: and God saw that it was good. And the evening and the morning were the third day.\n\nAnd God said, Let there be lights in the firmament of the heaven to divide the day from the night; and let them be for signs, and for seasons, and for days, and years. And let them be for lights in the firmament of the heaven to give light upon the earth: and it was so. And God made two great lights; the greater light to rule the day, and the lesser light to rule the night: he made the stars also. And God set them in the firmament of the heaven to give light upon the earth, and to rule over the day and over the night, and to divide the light from the darkness: and God saw that it was good. And the evening and the morning were the fourth day.' },

    // Left page text (fixed display)
    ;(function () {
      const t = PAGE_TEXTS[0]
      const el = document.getElementById('left-text-content')
      el.innerHTML = `<div class="page-chapter">${t.ch}</div>${t.body.replace(/\n\n/g,'<br><br>')}`
    })()

    // ── Build page stack ────────────────────────────────────────────────
    function buildPages(count) {
      pageEls.forEach(el => el.remove())
      pageEls = []
      const frontCover = document.getElementById('front-cover')
      for (let i = 0; i < count; i++) {
        const pt = PAGE_TEXTS[(i + 1) % PAGE_TEXTS.length]
        const t  = i / Math.max(count - 1, 1)
        const l  = Math.round(76 + t * 14)
        const s  = Math.round(46 + t * 22)

        const el = document.createElement('div')
        el.className = 'page-flip'
        el.style.background =
          `linear-gradient(to right, hsl(36,${s}%,${l - 6}%), hsl(40,${s + 10}%,${l + 5}%))`
        el.style.zIndex = 20 + (count - i)
        el.style.transform = `rotateY(${-i * 0.45}deg)` // slight left fan

        // Front face (text side, faces viewer on left)
        const front = document.createElement('div')
        front.className = 'page-front'
        front.style.background = el.style.background

        const txt = document.createElement('div')
        txt.className = 'page-text'
        txt.innerHTML =
          `<div class="page-chapter">${pt.ch}</div>` +
          pt.body.replace(/\n\n/g, '<br><br>') +
          '<br><br>' + pt.body.replace(/\n\n/g, '<br><br>')

        const pnFront = document.createElement('span')
        pnFront.className = 'page-num page-num-left'
        pnFront.textContent = (i + 2) * 2

        front.appendChild(txt)
        front.appendChild(pnFront)

        // Back face (plain parchment, visible on right after flip)
        const back = document.createElement('div')
        back.className = 'page-back'

        const ptBack = PAGE_TEXTS[(i + 2) % PAGE_TEXTS.length]
        const backTxt = document.createElement('div')
        backTxt.className = 'page-text'
        backTxt.innerHTML =
          `<div class="page-chapter">${ptBack.ch}</div>` +
          ptBack.body.replace(/\n\n/g, '<br><br>') +
          '<br><br>' + ptBack.body.replace(/\n\n/g, '<br><br>')

        const pnBack = document.createElement('span')
        pnBack.className = 'page-num page-num-right'
        pnBack.textContent = (i + 2) * 2 + 1

        back.appendChild(backTxt)
        back.appendChild(pnBack)

        el.style.background = 'none'
        el.appendChild(front)
        el.appendChild(back)
        book.insertBefore(el, frontCover)
        pageEls.push(el)
      }
    }

    // ── Hard reset ──────────────────────────────────────────────────────
    function hardReset() {
      ;[slidePanel, stampWrap, inkMark].forEach(
        el => (el.style.transition = 'none')
      )
      pageEls.forEach(el => (el.style.transition = 'none'))
      checkLine.style.transition = 'none'

      // Bible starts off-screen to the left
      bookWrap.style.transition    = 'none'
      bookWrap.style.transformOrigin = ''
      bookWrap.style.transform     = 'translateX(-100vw)'

      slidePanel.style.transition = 'none'
      slidePanel.style.transform  = ''
      slidePanel.style.opacity    = '1'

      pageEls.forEach(el => (el.style.transform = `rotateY(${parseInt(el.dataset.i || 0) * 0.45}deg)`))
      inkMark.style.opacity    = '0'
      inkMark.style.transform  = 'translate(-50%,-50%) scale(0)'
      checkLine.setAttribute('stroke-dashoffset', '200')
      stampWrap.style.top      = '-440px'
      bookWrap.classList.remove('shake')
      updateInkMarkBorder()
    }

    // ── Main sequence ───────────────────────────────────────────────────
    async function runSequence() {
      if (animating) return
      animating = true

      const pageCount = parseInt(document.getElementById('r-pages').value)
      const flipGapMs = parseInt(document.getElementById('r-gap').value)
      const inkDurMs  = parseFloat(document.getElementById('r-ink').value) * 1000

      buildPages(pageCount)
      hardReset()
      void bookWrap.offsetHeight // force repaint

      const slideDurMs  = getMs('--slide-dur')
      const flipDurMs   = getMs('--flip-dur')
      const stampFallMs = getMs('--stamp-fall-dur')
      const stampLiftMs = getMs('--stamp-lift-dur')
      const stampTotalH = 82 + 18 + 82
      const landTop     = Math.round(window.innerHeight / 2 - stampTotalH / 2)

      // ① Reading card exits right, Bible slides in from left — simultaneously
      slidePanel.style.transition =
        `transform var(--slide-dur) cubic-bezier(0.55,0,1,0.45),
         opacity var(--slide-dur) ease`
      slidePanel.style.transform = 'translateX(110%)'
      slidePanel.style.opacity   = '0'

      bookWrap.style.transition =
        `transform var(--slide-dur) cubic-bezier(0.22, 0, 0.18, 1.06)`
      bookWrap.style.transform = 'translateX(0)'

      // ② Pages start flipping almost immediately (momentum from the slide)
      await wait(60)

      for (let i = 0; i < pageEls.length; i++) {
        const el = pageEls[i]
        // Momentum effect: first pages flip fast, later ones slow down
        const speedMult = 0.45 + (i / pageEls.length) * 1.0
        el.style.transition =
          `transform ${Math.round(flipDurMs * speedMult)}ms cubic-bezier(0.35,0,0.65,1)`
        el.style.transform = 'rotateY(175deg)'
        if (i < pageEls.length - 1) await wait(flipGapMs)
      }

      // Wait for last flip + slide to both settle
      const remainingSlide = Math.max(slideDurMs - 60 - pageEls.length * flipGapMs, 0)
      await wait(Math.max(flipDurMs + 160, remainingSlide))

      await wait(220)

      // ④ Stamp falls
      stampWrap.style.transition =
        `top var(--stamp-fall-dur) cubic-bezier(0.22,0,0.28,1.5)`
      stampWrap.style.top = landTop + 'px'
      await wait(stampFallMs)

      // ⑤ Impact
      bookWrap.classList.add('shake')
      inkMark.style.transition = 'none'
      inkMark.style.opacity    = '1'
      inkMark.style.transform  = 'translate(-50%,-50%) scale(1.1)'
      await wait(90)
      inkMark.style.transition = 'transform 0.15s ease-out'
      inkMark.style.transform  = 'translate(-50%,-50%) scale(1)'
      await wait(80)
      bookWrap.classList.remove('shake')

      // ⑥ Draw checkmark
      checkLine.style.transition =
        `stroke-dashoffset ${inkDurMs}ms cubic-bezier(0.4,0,0.2,1)`
      checkLine.setAttribute('stroke-dashoffset', '0')
      await wait(inkDurMs + 60)

      // ⑦ Stamp lifts
      stampWrap.style.transition = `top var(--stamp-lift-dur) cubic-bezier(0.4,0,0.2,1)`
      stampWrap.style.top        = '-440px'
      await wait(stampLiftMs)

      await wait(180)

      // ⑧ Zoom into the ink mark center
      const fadeOverlay = document.getElementById('fade-overlay')
      bookWrap.style.transformOrigin = '50% 50%'
      bookWrap.style.transition = 'transform 0.85s cubic-bezier(0.2,0,0.3,1)'
      bookWrap.style.transform  = 'scale(30)'

      // Fade to black slightly after zoom starts
      await wait(200)
      fadeOverlay.style.transition = 'opacity 0.5s ease'
      fadeOverlay.style.opacity    = '1'
      await wait(600)

      // ⑨ Reset under cover of black, then fade back in to reading card
      fadeOverlay.style.transition = 'none'
      hardReset()
      slidePanel.style.transition = 'none'
      slidePanel.style.transform  = ''
      slidePanel.style.opacity    = '1'
      void fadeOverlay.offsetHeight

      await wait(60)
      fadeOverlay.style.transition = 'opacity 0.35s ease'
      fadeOverlay.style.opacity    = '0'
      await wait(380)

      // Notify parent app (when embedded as iframe)
      window.parent.postMessage({ type: 'readingCheckComplete' }, '*')

      animating = false
    }

    const LS_KEY = 'reading-check-v1'

    function applyColor({ id, hex, token, apply }) {
      const v = document.getElementById(id).value
      if (token) root.style.setProperty(token, v)
      const label = document.getElementById(hex)
      if (label) label.textContent = v
      if (apply) apply(v)
    }

    function applyRange({ id, val, token, unit, apply }) {
      const v = parseFloat(document.getElementById(id).value)
      if (token) root.style.setProperty(token, v + unit)
      const label = document.getElementById(val)
      if (label) label.textContent = v + unit
      if (apply) apply()
    }

    function saveToLS() {
      const out = {}
      colorMap.forEach(({ id }) => { out[id] = document.getElementById(id).value })
      rangeMap.forEach(({ id, noLS }) => { if (!noLS) out[id] = document.getElementById(id).value })
      localStorage.setItem(LS_KEY, JSON.stringify(out))
    }

    function loadFromLS() {
      const raw = localStorage.getItem(LS_KEY)
      if (!raw) return
      const saved = JSON.parse(raw)
      colorMap.forEach(entry => {
        if (saved[entry.id] != null) {
          document.getElementById(entry.id).value = saved[entry.id]
          applyColor(entry)
        }
      })
      // skip noLS entries — their values come from :root in the file
      rangeMap.forEach(entry => {
        if (!entry.noLS && saved[entry.id] != null) {
          document.getElementById(entry.id).value = saved[entry.id]
          applyRange(entry)
        }
      })
    }

    // Wire up listeners — save to localStorage on every change
    colorMap.forEach(entry => {
      document.getElementById(entry.id).addEventListener('input', () => {
        applyColor(entry)
        saveToLS()
      })
    })

    rangeMap.forEach(entry => {
      document.getElementById(entry.id).addEventListener('input', () => {
        applyRange(entry)
        saveToLS()
      })
    })

    document.getElementById('mark-btn').addEventListener('click', runSequence)

      location.reload()
    })

      const settings = {}
      ;[...colorMap, ...rangeMap].forEach(({ id }) => {

      })
      try {
        const res = await fetch('http://localhost:3456/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(settings),
        })
        if (res.ok) {
          saveBtn.textContent = '✓ Saved'
          saveBtn.classList.add('saved')
          setTimeout(() => {
            saveBtn.textContent = 'Save Changes'
            saveBtn.classList.remove('saved')

    // Init labels for noLS sliders (their values come from :root, not localStorage)

      if (!entry.noLS) return
      const input = document.getElementById(entry.id)
      const label = document.getElementById(entry.val)
      if (label) label.textContent = parseFloat(input.value) + entry.unit
    })

    setTimeout(runSequence, 400)
  </script>
</body>
</html>
